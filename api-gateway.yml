server:
  port: 8080

spring:

  cloud:

    gateway:

      server:

        webflux:

          discovery:

            locator:

              enabled: true

              lower-case-service-id: true

          routes:

            - id: user-service

              uri: lb://USER-SERVICE

              predicates:

                - Path=/api/users/**

            - id: product-service

              uri: lb://PRODUCT-SERVICE

              predicates:

                - Path=/api/products/**

            - id: order-service

              uri: lb://ORDER-SERVICE

              predicates:

                - Path=/api/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:

  endpoints:

    web:

      exposure:

        include: "*"