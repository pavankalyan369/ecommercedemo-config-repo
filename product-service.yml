server:
  port: 8082

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/productservice_db
    username: postgres
    password: pavan

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true
    fetch-registry: true

  instance:
    hostname: localhost
    prefer-ip-address: false 

management:
  endpoints:
    web:
      exposure:
        include: "*"