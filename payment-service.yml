server:
  port: 8084

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/paymentservice_db
    username: postgres
    password: pavan

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  kafka:

    bootstrap-servers: localhost:9092

    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    properties:

      spring: 

        json:

          add:

            type:

              headers: false


eureka:

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true

    fetch-registry: true

management:

  endpoints:

    web:

      exposure:

        include: "*"