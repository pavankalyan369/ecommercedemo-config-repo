server:
  port: 8083

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/orderservice_db
    username: postgres
    password: pavan

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true
    fetch-registry: true

  instance:
    hostname: localhost
    prefer-ip-address: false

management:

  endpoints:

    web:

      exposure:

        include: "*"

  endpoint:

    health:

      show-details: always

  health:

    circuitbreakers:

      enabled: true

resilience4j:

  circuitbreaker:

    instances:

      productService:

        register-health-indicator: true

        sliding-window-size: 10

        minimum-number-of-calls: 5

        permitted-number-of-calls-in-half-open-state: 3

        wait-duration-in-open-state: 20s

        failure-rate-threshold: 50

        automatic-transition-from-open-to-half-open-enabled: true

  retry:

    instances:

      productService:

        max-attempts: 3

        wait-duration: 2s
        
        enable-exponential-backoff: true

        exponential-backoff-multiplier: 2

  timelimiter:

    instances:

      productService:

        timeout-duration: 5s

  bulkhead:

    instances:

      productService:

        max-concurrent-calls: 2

        max-wait-duration: 2s

  ratelimiter:

    instances:

      productService:

        limit-refresh-period: 10s

        limit-for-period: 5

        timeout-duration: 0
      

  kafka:

    bootstrap-servers: localhost:9092

    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    properties:

      spring:

        json:

          add:

            type:

              headers: false        